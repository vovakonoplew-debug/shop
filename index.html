<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z1KROV SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #707579);
            --btn: var(--tg-theme-button-color, #248bed);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .nav { display: flex; justify-content: space-around; padding: 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .nav span { cursor: pointer; font-weight: 600; opacity: 0.7; }
        .nav span.active { opacity: 1; color: var(--btn); border-bottom: 2px solid var(--btn); }
        
        .container { padding: 15px; }
        .cat-list { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; padding-bottom: 5px; }
        .cat-chip { background: #f0f0f0; padding: 6px 15px; border-radius: 20px; font-size: 14px; white-space: nowrap; color: #000; }
        .cat-chip.active { background: var(--btn); color: white; }

        .card { border: 1px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 12px; background: rgba(0,0,0,0.02); }
        .price { color: var(--btn); font-weight: bold; font-size: 1.2em; margin: 8px 0; }
        
        button { background: var(--btn); color: var(--btn-text); border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="nav">
    <span id="tab-shop" class="active" onclick="showPage('shop')">Магазин</span>
    <span id="tab-profile" onclick="showPage('profile')">Профиль</span>
    <span id="tab-admin" class="hidden" onclick="showPage('admin')">Админ</span>
</div>

<div class="container">
    <div id="page-shop">
        <div class="cat-list" id="cat-container"></div>
        <div id="prod-container">Загрузка товаров...</div>
    </div>

    <div id="page-profile" class="hidden">
        <h3>История заказов</h3>
        <div id="history-container">Здесь будут ваши покупки</div>
    </div>

    <div id="page-admin" class="hidden">
        <h3>Добавить новый товар</h3>
        <input type="text" id="adm-name" placeholder="Название товара">
        <input type="number" id="adm-price" placeholder="Цена (USDT)">
        <input type="text" id="adm-cat" placeholder="Категория (Группа)">
        <button onclick="dbSave()">Опубликовать для всех</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const MY_USERNAME = "z1krov"; 

    // ВСТАВЬ СВОИ ДАННЫЕ ИЗ FIREBASE СЮДА
    const firebaseConfig = {
        apiKey: "AIzaSyBrsn0q_GE7gTxScGlQcLBzAH34uqr26qo",
        authDomain: "shop24344-fa75f.firebaseapp.com", // замени PROJECT_ID
        projectId: "shop24344-fa75f",                  // замени PROJECT_ID
        storageBucket: "shop24344-fa75f.firebasestorage.app",   // замени PROJECT_ID
        appId: "1:775096639365:web:78e6798f636945d8b66eec"                           // замени APP_ID
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Проверка админа
    if (tg.initDataUnsafe?.user?.username === MY_USERNAME) {
        document.getElementById('tab-admin').classList.remove('hidden');
    }

    function showPage(page) {
        ['shop', 'profile', 'admin'].forEach(p => {
            document.getElementById('page-' + p).classList.toggle('hidden', p !== page);
            document.getElementById('tab-' + p).classList.toggle('active', p === page);
        });
        if (page === 'profile') renderHistory();
    }

    // Сохранение в базу (Админ)
    async function dbSave() {
        const name = document.getElementById('adm-name').value;
        const price = document.getElementById('adm-price').value;
        const cat = document.getElementById('adm-cat').value;

        if (name && price && cat) {
            await db.collection("products").add({ name, price: Number(price), cat });
            alert("Товар добавлен!");
            document.getElementById('adm-name').value = '';
            document.getElementById('adm-price').value = '';
            showPage('shop');
        }
    }

    // Загрузка товаров
    function loadData() {
        db.collection("products").onSnapshot((snapshot) => {
            const prods = [];
            const cats = new Set(["Все"]);
            snapshot.forEach(doc => {
                const data = doc.data();
                prods.push(data);
                cats.add(data.cat);
            });
            renderCats(Array.from(cats));
            renderProds(prods);
        });
    }

    function renderCats(cats) {
        const container = document.getElementById('cat-container');
        container.innerHTML = cats.map(c => `<div class="cat-chip" onclick="filterBy('${c}')">${c}</div>`).join('');
    }

    function renderProds(list) {
        const container = document.getElementById('prod-container');
        container.innerHTML = list.map(p => `
            <div class="card">
                <small>${p.cat}</small>
                <div style="font-weight:bold; margin-top:4px;">${p.name}</div>
                <div class="price">${p.price} USDT</div>
                <button onclick="buyAction('${p.name}', ${p.price})">Купить</button>
            </div>
        `).join('');
        window.allProds = list;
    }

    function filterBy(cat) {
        if (cat === "Все") renderProds(window.allProds);
        else renderProds(window.allProds.filter(p => p.cat === cat));
    }

    function buyAction(name, price) {
        // Сохраняем в локальную историю
        let orders = JSON.parse(localStorage.getItem('my_orders') || "[]");
        orders.push({ name, price, date: new Date().toLocaleDateString() });
        localStorage.setItem('my_orders', JSON.stringify(orders));

        // Ссылка в ЛС к тебе
        const text = `Привет z1krov! Купил товар: ${name}. Сумма: ${price} USDT. Проверь оплату.`;
        tg.openTelegramLink(`https://t.me/${MY_USERNAME}?text=${encodeURIComponent(text)}`);
    }

    function renderHistory() {
        const orders = JSON.parse(localStorage.getItem('my_orders') || "[]");
        const container = document.getElementById('history-container');
        if (orders.length === 0) return;
        container.innerHTML = orders.reverse().map(o => `
            <div style="padding:10px; border-bottom:1px solid #eee;">
                <b>${o.name}</b><br><small>${o.date} — ${o.price} USDT</small>
            </div>
        `).join('');
    }

    loadData();
    tg.expand();
</script>
</body>
</html>
