<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Store Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #fff);
            --text: var(--tg-theme-text-color, #000);
            --hint: var(--tg-theme-hint-color, #999);
            --button: var(--tg-theme-button-color, #248bed);
            --button-text: var(--tg-theme-button-text-color, #fff);
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .tab-nav { display: flex; justify-content: space-around; margin-bottom: 20px; border-bottom: 1px solid var(--hint); padding-bottom: 10px; }
        .tab-nav span { cursor: pointer; font-weight: bold; }
        
        .card { border: 1px solid var(--hint); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .price { color: var(--button); font-weight: bold; font-size: 1.2em; }
        
        button { background: var(--button); color: var(--button-text); border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        input { width: 90%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid var(--hint); background: var(--bg); color: var(--text); }
        
        .hidden { display: none; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg); padding: 20px; border-radius: 15px; width: 80%; text-align: center; }
    </style>
</head>
<body>

<div class="tab-nav">
    <span onclick="showPage('shop')">Магазин</span>
    <span onclick="showPage('profile')">Профиль</span>
    <span onclick="showPage('admin')" id="admin-btn" class="hidden">Админ</span>
</div>

<div id="shop-page">
    <div id="product-list"></div>
</div>

<div id="profile-page" class="hidden">
    <h3>Мои заказы</h3>
    <div id="order-history"></div>
</div>

<div id="admin-page" class="hidden">
    <h3>Добавить товар</h3>
    <input type="text" id="p-name" placeholder="Название товара">
    <input type="number" id="p-price" placeholder="Цена (USDT)">
    <input type="text" id="p-cat" placeholder="Группа/Категория">
    <button onclick="saveProduct()">Сохранить товар</button>
</div>

<div id="payment-modal" class="modal hidden">
    <div class="modal-content">
        <h4>Оплата по реквизитам</h4>
        <p>Переведите сумму на кошелек (USDT TRC-20):</p>
        <code id="wallet-address" style="word-break: break-all; color: var(--button);">TYourCryptoWalletAddressHere12345</code>
        <button onclick="copyWallet()">Копировать адрес</button>
        <button style="background: #4caf50;" onclick="confirmPayment()">Я оплатил(а)</button>
        <button style="background: #f44336;" onclick="closePayment()">Отмена</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const ADMIN_USERNAME = "z1krov"; // ВАЖНО: поменяй на свой
    const MY_WALLET = "TYourCryptoWalletAddressHere12345"; // Твой крипто-кошелек

    let products = JSON.parse(localStorage.getItem('products')) || [];
    let orders = JSON.parse(localStorage.getItem('orders')) || [];
    let currentOrder = null;

    // Показываем админку только владельцу (по желанию можно просто оставить кнопку)
    if (tg.initDataUnsafe?.user?.username === ADMIN_USERNAME) {
        document.getElementById('admin-btn').classList.remove('hidden');
    }

    function showPage(page) {
        ['shop', 'profile', 'admin'].forEach(p => {
            document.getElementById(`${p}-page`).classList.toggle('hidden', p !== page);
        });
        if(page === 'shop') renderProducts();
        if(page === 'profile') renderOrders();
    }

    function renderProducts() {
        const list = document.getElementById('product-list');
        list.innerHTML = products.length ? '' : 'Товаров пока нет.';
        products.forEach((p, index) => {
            list.innerHTML += `
                <div class="card">
                    <b>[${p.cat}]</b><br>
                    <strong>${p.name}</strong><br>
                    <span class="price">${p.price} USDT</span>
                    <button onclick="openPayment(${index})">Купить</button>
                </div>`;
        });
    }

    function saveProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const cat = document.getElementById('p-cat').value;
        if(!name || !price) return alert('Заполни поля');
        
        products.push({name, price, cat});
        localStorage.setItem('products', JSON.stringify(products));
        alert('Товар добавлен!');
        showPage('shop');
    }

    function openPayment(index) {
        currentOrder = products[index];
        document.getElementById('payment-modal').classList.remove('hidden');
    }

    function closePayment() {
        document.getElementById('payment-modal').classList.add('hidden');
    }

    function copyWallet() {
        navigator.clipboard.writeText(MY_WALLET);
        alert('Адрес скопирован!');
    }

    function confirmPayment() {
        const orderInfo = {
            ...currentOrder,
            date: new Date().toLocaleString()
        };
        orders.push(orderInfo);
        localStorage.setItem('orders', JSON.stringify(orders));

        // Формируем ссылку в ЛС админу
        const text = `Заявка на покупку!\nТовар: ${orderInfo.name}\nСумма: ${orderInfo.price} USDT\nЯ оплатил, проверьте перевод.`;
        const url = `https://t.me/${ADMIN_USERNAME}?text=${encodeURIComponent(text)}`;
        
        tg.openTelegramLink(url);
        closePayment();
        showPage('profile');
    }

    function renderOrders() {
        const list = document.getElementById('order-history');
        list.innerHTML = orders.length ? '' : 'История пуста.';
        orders.forEach(o => {
            list.innerHTML += `<div class="card" style="opacity: 0.8; font-size: 0.9em;">
                ${o.date}<br><b>${o.name}</b> - ${o.price} USDT
            </div>`;
        });
    }

    renderProducts();
    tg.ready();
</script>
</body>
</html>
