<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z1KROV SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f1f1f4);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #999999);
            --btn: var(--tg-theme-button-color, #007aff);
            --btn-txt: var(--tg-theme-button-text-color, #ffffff);
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--sec-bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        
        /* Витрина */
        .container { padding: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--bg); border-radius: 16px; padding: 12px; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.03); position: relative; }
        .card-tag { font-size: 10px; font-weight: bold; color: var(--btn); text-transform: uppercase; margin-bottom: 4px; }
        .card-name { font-size: 15px; font-weight: 600; margin-bottom: 8px; height: 36px; overflow: hidden; }
        .card-price { font-size: 18px; font-weight: 800; margin-bottom: 12px; }

        /* Категории */
        .cat-scroll { display: flex; overflow-x: auto; padding: 12px; background: var(--bg); gap: 8px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .cat-item { background: var(--sec-bg); padding: 7px 16px; border-radius: 20px; font-size: 14px; white-space: nowrap; }
        .cat-item.active { background: var(--btn); color: var(--btn-txt); }

        /* Таббар */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: var(--bg); display: flex; border-top: 1px solid rgba(0,0,0,0.1); padding-bottom: env(safe-area-inset-bottom); }
        .tab { flex: 1; text-align: center; padding: 12px 0; font-size: 11px; color: var(--hint); cursor: pointer; }
        .tab.active { color: var(--btn); }
        .tab-icon { font-size: 22px; display: block; margin-bottom: 2px; }

        /* Админка */
        .admin-box { background: var(--bg); margin: 12px; padding: 20px; border-radius: 16px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--sec-bg); background: var(--sec-bg); color: var(--text); box-sizing: border-box; font-size: 16px; }
        .btn-main { background: var(--btn); color: var(--btn-txt); border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .del-btn { background: #ff3b30; color: white; border: none; padding: 5px; border-radius: 5px; font-size: 10px; margin-top: 5px; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="view-shop">
    <div class="cat-scroll" id="cat-list"></div>
    <div class="container" id="prod-list"></div>
</div>

<div id="view-profile" class="hidden">
    <div class="admin-box">
        <h3>📜 Моя история</h3>
        <div id="order-history">История пуста</div>
    </div>
</div>

<div id="view-admin" class="hidden">
    <div class="admin-box">
        <h3>Добавить товар</h3>
        <input type="text" id="adm-name" placeholder="Название">
        <input type="number" id="adm-price" placeholder="Цена (USDT)">
        <input type="text" id="adm-cat" placeholder="Категория">
        <button class="btn-main" onclick="uploadProduct()">Опубликовать</button>
    </div>
    <div id="admin-manage-list" style="padding: 12px;"></div>
</div>

<div class="tab-bar">
    <div class="tab active" id="t-shop" onclick="nav('shop')"><span class="tab-icon">🛒</span>Магазин</div>
    <div class="tab" id="t-profile" onclick="nav('profile')"><span class="tab-icon">👤</span>Профиль</div>
    <div class="tab hidden" id="t-admin" onclick="nav('admin')"><span class="tab-icon">⚙️</span>Админ</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const ADMIN_ID = 1577146268; // Твой ID
    const MY_USER = "z1krov";

    const firebaseConfig = {
        apiKey: "AIzaSyBrsn0q_GE7gTxScGlQcLBzAH34uqr26qo",
        authDomain: "shop24344-fa75f.firebaseapp.com",
        projectId: "shop24344-fa75f",
        storageBucket: "shop24344-fa75f.firebasestorage.app",
        appId: "1:775096639365:web:78e6798f636945d8b66eec"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ПРОВЕРКА ПО ID
    const userTelegramId = tg.initDataUnsafe?.user?.id;
    if (userTelegramId === ADMIN_ID) {
        document.getElementById('t-admin').classList.remove('hidden');
    }

    function nav(page) {
        ['shop', 'profile', 'admin'].forEach(p => {
            document.getElementById('view-' + p).classList.toggle('hidden', p !== page);
            document.getElementById('t-' + p).classList.toggle('active', p === page);
        });
        if(page === 'profile') renderOrders();
        if(page === 'admin') renderAdminList();
    }

    async function uploadProduct() {
        const name = document.getElementById('adm-name').value;
        const price = document.getElementById('adm-price').value;
        const cat = document.getElementById('adm-cat').value;
        if(!name || !price || !cat) return alert("Заполни все!");

        await db.collection("items").add({ name, price: Number(price), cat, time: Date.now() });
        alert("Товар добавлен!");
        document.getElementById('adm-name').value = '';
        nav('shop');
    }

    function syncData() {
        db.collection("items").orderBy("time", "desc").onSnapshot(snap => {
            const items = [];
            const cats = new Set(["Все"]);
            snap.forEach(doc => {
                let data = doc.data();
                data.id = doc.id; // сохраняем ID документа для удаления
                items.push(data);
                cats.add(data.cat);
            });
            window.cache = items;
            renderCats(Array.from(cats));
            renderItems(items);
        });
    }

    function renderCats(cats) {
        document.getElementById('cat-list').innerHTML = cats.map(c => 
            `<div class="cat-item" onclick="filter('${c}', this)">${c}</div>`
        ).join('');
        if(document.querySelector('.cat-item')) document.querySelector('.cat-item').classList.add('active');
    }

    function renderItems(list) {
        document.getElementById('prod-list').innerHTML = list.map(i => `
            <div class="card">
                <span class="card-tag">${i.cat}</span>
                <span class="card-name">${i.name}</span>
                <span class="card-price">${i.price} USDT</span>
                <button class="btn-main" style="padding: 8px; font-size: 13px;" onclick="buy('${i.name}', ${i.price})">Купить</button>
            </div>
        `).join('');
    }

    function renderAdminList() {
        const list = window.cache || [];
        document.getElementById('admin-manage-list').innerHTML = "<h4>Удаление товаров:</h4>" + list.map(i => `
            <div style="background:white; padding:10px; margin-bottom:5px; border-radius:10px; display:flex; justify-content:space-between; align-items:center;">
                <span>${i.name}</span>
                <button class="del-btn" onclick="deleteItem('${i.id}')">Удалить</button>
            </div>
        `).join('');
    }

    async function deleteItem(id) {
        if(confirm("Удалить этот товар?")) {
            await db.collection("items").doc(id).delete();
        }
    }

    function filter(cat, el) {
        document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        if(cat === "Все") renderItems(window.cache);
        else renderItems(window.cache.filter(i => i.cat === cat));
    }

    function buy(name, price) {
        let history = JSON.parse(localStorage.getItem('my_orders') || "[]");
        history.push({ name, price, date: new Date().toLocaleDateString() });
        localStorage.setItem('my_orders', JSON.stringify(history));

        tg.HapticFeedback.impactOccurred('medium');
        const url = `https://t.me/${MY_USER}?text=${encodeURIComponent("Привет! Покупаю " + name + " за " + price + " USDT")}`;
        tg.openTelegramLink(url);
    }

    function renderOrders() {
        const h = JSON.parse(localStorage.getItem('my_orders') || "[]");
        document.getElementById('order-history').innerHTML = h.length ? h.reverse().map(o => 
            `<div style="padding:10px 0; border-bottom:1px solid #eee;">
                <b>${o.name}</b> — ${o.price} USDT<br><small style="color:gray">${o.date}</small>
            </div>`
        ).join('') : "История пуста";
    }

    syncData();
    tg.expand();
</script>
</body>
</html>
